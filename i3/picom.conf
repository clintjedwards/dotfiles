#################################
# Backend & performance
#################################
backend = "glx";
vsync = true;
use-damage = true;

# Try to avoid tearing / glitches
detect-transient = true;
detect-client-leader = true;
use-ewmh-active-win = true;
mark-ovredir-focused = true;

#################################
# Shadows
#################################
shadow = true;
shadow-radius = 18;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.35;

# Don’t shadow some window types
shadow-exclude = [
  "name *= 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'i3-frame'",
  "class_g = 'Polybar'",
  "class_g = 'slop'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
# Fading
#################################
fading = true;
fade-in-step = 0.035;
fade-out-step = 0.035;
fade-delta = 10;
no-fading-openclose = false;

#################################
# Transparency / Opacity rules
#################################
inactive-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "90:class_g = 'kitty'",
  "90:class_g = 'Alacritty'",
  "90:class_g = 'Ghostty'",
  "95:class_g = 'Code'",
];

#################################
# Corners (if supported in your build)
#################################
corner-radius = 0;
rounded-corners-exclude = [];

#################################
# Blur (ibhagwan fork only)
#################################
blur-method = "dual_kawase";
blur-strength = 6;

blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;

blur-background-exclude = [];

#################################
# General settings
#################################
focus-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'i3bar'",
  "class_g = 'slop'"
];

unredir-if-possible = true;
unredir-if-possible-exclude = [
  "class_g = 'mpv'",
  "class_g = 'vlc'"
];

log-level = "warn";
